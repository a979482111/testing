version: '3.8'

services:
  snake-game:
    build: .
    ports:
      - "3001:3001"  # 可修改为其他端口，如 "80:3001"
    volumes:
      # 挂载数据目录，确保排行榜数据持久化
      - ./backend/data:/app/backend/data
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - snake-network

networks:
  snake-network:
    driver: bridge
